# lefthook.yml

pre-push:
  commands:
    validate-branch-name:
      run: node scripts/validate-branch-name/index.js

commit-msg:
  commands:
    validate-commit-message:
      run: node scripts/validate-commit-msg/index.js {1}

pre-commit:
  parallel: true
  jobs:
    - run: npx eslint --fix {staged_files}
      name: Lint staged files
      glob:
        - '*.js'
        - '*.jsx'
        - '*.ts'
        - '*.tsx'
      stage_fixed: true
